<div class="container mt-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="fw-bold text-primary mb-0">Courses</h2>
    <a class="btn btn-primary" routerLink="/courses/new">
      <i class="bi bi-plus-lg me-1"></i>Add Course
    </a>
  </div>

  <div *ngIf="loading" class="text-center py-5">
    <div class="spinner-border text-primary" role="status">
      <span class="visually-hidden">Loading...</span>
    </div>
    <p class="mt-2 text-muted">Loading courses...</p>
  </div>

  <div *ngIf="errorMessage" class="alert alert-danger alert-dismissible fade show" role="alert">
    {{ errorMessage }}
    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
  </div>

  <div *ngIf="!loading && courses.length === 0 && !errorMessage" class="text-center py-5">
    <p class="text-muted fs-5">No courses available yet.</p>
    <a class="btn btn-outline-primary" routerLink="/courses/new">Create your first course</a>
  </div>

  <div class="row" *ngIf="!loading && courses.length > 0">
    <div class="col-12 mb-3" *ngFor="let course of courses">
      <div class="card shadow-sm border-0">
        <div class="card-body">
          <div class="d-flex justify-content-between align-items-start">
            <div>
              <h5 class="card-title fw-semibold mb-1">{{ course.title }}</h5>
              <p class="card-text text-muted mb-2">{{ course.description }}</p>
              <span class="badge bg-primary bg-opacity-10 text-primary fs-6 px-3 py-2">
                ৳ {{ course.price }}
              </span>
            </div>
            <div class="btn-group">
              <button class="btn btn-outline-primary btn-sm" (click)="editCourse(course.id)">
                <i class="bi bi-pencil"></i> Edit
              </button>
              <button class="btn btn-outline-danger btn-sm" (click)="deleteCourse(course.id)">
                <i class="bi bi-trash"></i> Delete
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
